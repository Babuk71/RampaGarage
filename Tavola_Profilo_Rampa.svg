  <text x="70.00" y="786.00" font-size="12" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">CRITICITA' DA RECEPIRE IN FASE REALIZZATIVA</text>
  <circle cx="90.00" cy="817.00" r="11.00" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="86.50" y="812.00" font-size="10" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">1</text>
  <text x="110.00" y="814.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">TRANSITO VETTURA (governante): anche su questo profilo-LIMITE (clearance MASSIMIZZATA) il PARAURTI ANTERIORE resta a -0.80 cm a luce h=8 cm</text>
  <text x="110.00" y="836.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">(verificato a sweep continuo): la vettura estrema NON passa alla luce di progetto. Margini risicati solo aumentando la luce: +0.24 cm a h=9,</text>
  <text x="110.00" y="858.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">+1.23 cm a h=10 (ottimistici, modello a contatto puntiforme; splitter/lame reali stanno piu' in basso). Vincolo geometrico a H=380 / L=1700.</text>
  <circle cx="90.00" cy="883.00" r="11.00" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="86.50" y="878.00" font-size="10" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">2</text>
  <text x="110.00" y="880.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">SOGLIA GARAGE: la soglia deve essere MAX 3 cm (luce vettura 8 cm); pavimento garage ribassato ~3 cm; guaina impermeabile continua e risvoltata.</text>
  <circle cx="90.00" cy="905.00" r="11.00" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="86.50" y="900.00" font-size="10" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">3</text>
  <text x="110.00" y="902.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">DRENAGGIO: caditoia trasversale a fondo rampa (a monte della soglia), grata carrabile classe C250, maglia &lt;= 20x20 mm; pozzetto + scarico dedicato.</text>
  <circle cx="90.00" cy="927.00" r="11.00" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="86.50" y="922.00" font-size="10" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">4</text>
  <text x="110.00" y="924.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">PENDENZA / ADERENZA: picco 47% (sconsigliato per aderenza, usura, comfort e avviamento in salita). Superficie in CLS spazzolato trasversale</text>
  <text x="110.00" y="946.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">(striature ortogonali alla marcia, prof. 3-5 mm, passo 10-15 mm), coeff. attrito bagnato richiesto &gt;= 0.50. Evitare CLS lisciato.</text>
  <circle cx="90.00" cy="971.00" r="11.00" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="86.50" y="966.00" font-size="10" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">5</text>
  <text x="110.00" y="968.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">ANTIGHIACCIO (consigliato): a 47% qualunque formazione di ghiaccio rende la rampa inagibile/pericolosa. Cavi scaldanti o serpentina nel massetto +</text>
  <text x="110.00" y="990.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">termostato e sensore umidita'.</text>
  <text x="1620.00" y="786.00" font-size="12" fill="#2244bb" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">DATI E NOTE</text>
  <text x="1620.00" y="814.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Vettura di riferimento: Porsche 992 GT3 RS - luce da terra 8 cm, passo 240 cm, sbalzo ant. 140 / post. 120 cm.</text>
  <text x="1620.00" y="834.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Geometria: CREST R=950 (centro 0, -570) - retto 13 cm - SAG R=3042 (centro 1700, 3042); picco 47%.</text>
  <text x="1620.00" y="854.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Profilo-LIMITE di fattibilita': massimizza la clearance, ma a 47% di picco NON e' un profilo di marcia confortevole (sconsigliato).</text>
  <text x="1620.00" y="874.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Anche al meglio la rampa resta NON percorribile a h=8: per liberare il transito servono piu' sviluppo (&gt;1700), meno dislivello (&lt;380) o un ausilio fisico.</text>
  <text x="1620.00" y="894.00" font-size="9" fill="#cc0000" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Larghezza rampa: assunta 300 cm (DATO DA RILEVARE in sito - serve per verifica manovra in pianta).</text>
  <text x="1620.00" y="914.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Sezione/solaio, planimetria di manovra e dettagli costruttivi: NON oggetto di questa tavola (preliminare di solo profilo).</text>
  <text x="1620.00" y="934.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">I raccordi sono archi di cerchio; un profilo parabolico/clotoide darebbe risultati analoghi sui transiti.</text>
