  <text x="70.00" y="76.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Profilo che MASSIMIZZA la clearance a H=380 cm / L=1700 cm fissi: raccordo CREST R=950 + raccordo SAG R=3042 che si fondono; tratto retto 13 cm (praticamente assente).</text>
  <text x="70.00" y="92.00" font-size="9" fill="#111111" font-family="Arial,sans-serif" dominant-baseline="text-after-edge">Pendenza di PICCO 47% (25 deg). DISEGNO PRELIMINARE NON ESECUTIVO - quote in cm, angoli in gradi, da verificare in sito.</text>
